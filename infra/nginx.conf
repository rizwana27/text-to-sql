# nginx configuration for Text-to-SQL
# Place at: /etc/nginx/sites-available/texttosql
# Enable with: ln -s /etc/nginx/sites-available/texttosql /etc/nginx/sites-enabled/
# Reload with: sudo nginx -t && sudo systemctl reload nginx

# Set Connection header to "upgrade" only for WebSocket requests; omit it for
# normal HTTP requests so upstream keep-alive is not disrupted.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

# Suppress access log noise from the health-check endpoint.
map $request_uri $loggable {
    ~^/api/health  0;
    default        1;
}

upstream texttosql_backend {
    server 127.0.0.1:8000;
    keepalive 32;                         # Reuse connections to gunicorn workers
}

server {
    listen 80;
    server_name _;                        # Match any hostname; replace with your domain in production

    # Health-check requests are excluded from the access log (controlled by the map above)
    access_log /var/log/nginx/access.log combined if=$loggable;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Serve React frontend static files from the Vite build output
    root /opt/text-to-sql/frontend/dist;
    index index.html;

    # API proxy: forward all /api/* requests to the FastAPI backend
    location /api/ {
        proxy_pass http://texttosql_backend;
        proxy_http_version 1.1;

        # WebSocket support: Connection is set to "upgrade" only when the client
        # sends an Upgrade header; otherwise it is omitted to preserve keep-alive.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Pass real client IP to FastAPI for logging
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for LLM calls — GPT-4o can take 30-60s under load
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        # Buffer settings for large result sets
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    # SPA fallback: serve index.html for any non-file request
    # This enables client-side routing in React
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite fingerprints filenames)
    location ~* \.(js|css|woff2|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Block hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }
}
